<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIS Labs - Core Technology Suite</title>
    <style>
        :root {
            --bg-color: #0d1117; --text-color: #c9d1d9; --accent-color: #58a6ff;
            --card-bg: #161b22; --border-color: #30363d; --success-color: #238636;
            --error-color: #f85149; --console-bg: #010409;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        .preset-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn-preset { background: #21262d; color: var(--text-color); border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .view-content { width: 100%; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: start; }
        .panel { background: var(--card-bg); border: 1px solid var(--border-color); padding: 1.2rem; border-radius: 8px; }
        .matrix-box { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        textarea { background: #0d1117; border: 1px solid var(--border-color); color: #fff; padding: 10px; font-family: monospace; height: 120px; resize: none; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .btn-action { background: var(--success-color); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; }
        .output-view { background: #0d1117; border: 1px solid var(--border-color); padding: 10px; height: 120px; overflow-y: auto; color: #8b949e; font-family: monospace; }
        .console-terminal { height: 200px; background: var(--console-bg); border: 1px solid var(--border-color); padding: 10px; font-family: monospace; font-size: 0.75rem; color: #79c0ff; overflow-y: auto; margin-top: 10px; }
        #viewCompressor { display: none; text-align: center; padding: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>APIS Labs</h1>
        <div class="preset-container">
            <button class="btn-preset" id="viewToggle">Switch to: alcompress SDK</button>
            <button class="btn-preset" id="loadRetailPreset">E-Commerce</button>
            <button class="btn-preset" id="loadLogisticsPreset">Logistics</button>
        </div>
    </header>

    <div id="viewTransformer" class="view-content">
        <div class="dashboard">
            <div class="panel">
                <div style="margin-bottom:10px;">📥 Client Ingestion Vectors</div>
                <div class="matrix-box">
                    <textarea id="dataInputA"></textarea>
                    <textarea id="mappingInputA"></textarea>
                </div>
                <div class="matrix-box">
                    <textarea id="dataInputB"></textarea>
                    <textarea id="mappingInputB"></textarea>
                </div>
            </div>
            <div class="panel">
                <button class="btn-action" id="transformBtn">Run Simultaneous Core →</button>
                <div class="console-terminal" id="consoleTerminal">System Ready.</div>
            </div>
            <div class="panel">
                <div style="margin-bottom:10px;">📤 Normalization Output Monitors</div>
                <div class="output-view" id="outputContainerA">Alpha Output...</div>
                <div class="output-view" id="outputContainerB" style="margin-top:10px;">Beta Output...</div>
            </div>
        </div>
    </div>

    <div id="viewCompressor" class="view-content">
        <h2>alcompress SDK</h2>
        <p>Deterministic lattice compression engine.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // View Toggling
            document.getElementById('viewToggle').onclick = () => {
                const t = document.getElementById('viewTransformer');
                const c = document.getElementById('viewCompressor');
                const isT = t.style.display !== 'none';
                t.style.display = isT ? 'none' : 'block';
                c.style.display = isT ? 'block' : 'none';
                document.getElementById('viewToggle').innerText = isT ? "Switch to: JSON Transformer" : "Switch to: alcompress SDK";
            };

            // Preset Loading
            const presets = {
                retail: { dA: '{"order":"1"}', mA: '{"map":"alpha"}', dB: '{"txn":"2"}', mB: '{"map":"beta"}' },
                logistics: { dA: '{"load":"1"}', mA: '{"map":"log"}', dB: '{"ship":"2"}', mB: '{"map":"log"}' }
            };

            const load = (key) => {
                const p = presets[key];
                document.getElementById('dataInputA').value = p.dA;
                document.getElementById('mappingInputA').value = p.mA;
                document.getElementById('dataInputB').value = p.dB;
                document.getElementById('mappingInputB').value = p.mB;
            };

            document.getElementById('loadRetailPreset').onclick = () => load('retail');
            document.getElementById('loadLogisticsPreset').onclick = () => load('logistics');

            // Pipeline Execution
            document.getElementById('transformBtn').onclick = async () => {
                const log = (m) => document.getElementById('consoleTerminal').innerHTML += `<div>> ${m}</div>`;
                log("Dispatching to Render cluster...");
                try {
                    const res = await fetch('https://renderbackend-dnyz.onrender.com/v1/transform', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ data: document.getElementById('dataInputA').value })
                    });
                    const data = await res.json();
                    document.getElementById('outputContainerA').innerText = JSON.stringify(data);
                    log("Transformation complete.");
                } catch (e) {
                    log("Error: " + e.message);
                }
            };
        });
    </script>
</body>
</html>
