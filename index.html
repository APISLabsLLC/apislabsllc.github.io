<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIS Labs - Core Transformation Engine</title>
    <style>
        :root {
            --bg-color: #0d1117; --text-color: #c9d1d9; --accent-color: #58a6ff;
            --card-bg: #161b22; --border-color: #30363d; --success-color: #238636;
            --error-color: #f85149; --console-bg: #010409; --warning-bg: rgba(248, 81, 73, 0.1);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        .preset-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn-preset { background: #21262d; color: var(--text-color); border: 1px solid var(--border-color); padding: 6px 14px; border-radius: 15px; cursor: pointer; font-size: 0.8rem; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; align-items: start; }
        .panel { background: var(--card-bg); border: 1px solid var(--border-color); padding: 1.2rem; border-radius: 8px; }
        .panel-title { color: #fff; font-size: 1rem; margin-bottom: 1rem; }
        .matrix-box { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        textarea { background: #0d1117; border: 1px solid var(--border-color); color: #fff; padding: 10px; font-family: monospace; height: 120px; resize: none; border-radius: 6px; }
        .btn-action { background: var(--success-color); color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; }
        .output-view { background: #0d1117; border: 1px solid var(--border-color); padding: 10px; height: 120px; overflow-y: auto; color: #8b949e; font-family: monospace; }
        .console-terminal { height: 200px; background: var(--console-bg); border: 1px solid var(--border-color); padding: 10px; font-family: monospace; font-size: 0.75rem; color: #79c0ff; overflow-y: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>APIS Labs</h1>
        <div class="preset-container">
            <button class="btn-preset" id="loadRetailPreset">E-Commerce</button>
            <button class="btn-preset" id="loadLogisticsPreset">Logistics</button>
        </div>
    </header>

    <div class="dashboard">
        <div class="panel">
            <div class="panel-title">📥 Client Ingestion Vectors</div>
            <div class="matrix-box">
                <textarea id="dataInputA" placeholder="Matrix Alpha Data"></textarea>
                <textarea id="mappingInputA" placeholder="Matrix Alpha Mapping"></textarea>
            </div>
            <div class="matrix-box">
                <textarea id="dataInputB" placeholder="Matrix Beta Data"></textarea>
                <textarea id="mappingInputB" placeholder="Matrix Beta Mapping"></textarea>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">Asynchronous Core</div>
            <button class="btn-action" id="transformBtn">Run Simultaneous Core →</button>
            <div class="console-terminal" id="consoleTerminal">System Ready.</div>
        </div>

        <div class="panel">
            <div class="panel-title">📤 Normalization Output Monitors</div>
            <div class="matrix-box">
                <div class="output-view" id="outputContainerA">Alpha Output...</div>
            </div>
            <div class="matrix-box">
                <div class="output-view" id="outputContainerB">Beta Output...</div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const testPresets = {
                retail: { dataA: {"order": 1}, mapA: {"key": "val"}, dataB: {"txn": 2}, mapB: {"key": "val"} },
                logistics: { dataA: {"load": 1}, mapA: {"key": "val"}, dataB: {"ship": 2}, mapB: {"key": "val"} }
            };

            function log(msg) {
                const el = document.getElementById('consoleTerminal');
                el.innerHTML += `<div>> ${msg}</div>`;
                el.scrollTop = el.scrollHeight;
            }

            document.getElementById('loadRetailPreset').onclick = () => {
                document.getElementById('dataInputA').value = JSON.stringify(testPresets.retail.dataA);
                document.getElementById('mappingInputA').value = JSON.stringify(testPresets.retail.mapA);
                document.getElementById('dataInputB').value = JSON.stringify(testPresets.retail.dataB);
                document.getElementById('mappingInputB').value = JSON.stringify(testPresets.retail.mapB);
                log("Retail preset loaded.");
            };

            document.getElementById('transformBtn').onclick = async () => {
                log("Dispatching to Render cluster...");
                try {
                    const response = await fetch('https://renderbackend-dnyz.onrender.com/v1/transform', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ /* build from textareas */ })
                    });
                    const data = await response.json();
                    document.getElementById('outputContainerA').innerText = JSON.stringify(data);
                    log("Transformation complete.");
                } catch (e) {
                    log("Error: " + e.message);
                }
            };
        });
    </script>
</body>
</html>
