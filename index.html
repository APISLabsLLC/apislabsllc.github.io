<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APIS Labs - Core Technology Suite</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --card-bg: #161b22;
            --border-color: #30363d;
            --success-color: #238636;
            --error-color: #f85149;
            --console-bg: #010409;
            --warning-bg: rgba(248, 81, 73, 0.1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .preset-container { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        
        .btn-preset {
            background-color: #21262d;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        /* Fixed Grid Layout */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .panel {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 8px;
        }

        .matrix-split-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .matrix-box {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #0d1117;
            border: 1px solid var(--border-color);
            color: #ffffff;
            font-family: monospace;
            padding: 10px;
            box-sizing: border-box;
            resize: vertical;
        }

        .btn-action {
            background-color: var(--success-color);
            color: white;
            padding: 15px;
            border: none;
            width: 100%;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        .output-view {
            background: #0d1117;
            border: 1px solid var(--border-color);
            padding: 10px;
            height: 100px;
            overflow-y: auto;
            color: #8b949e;
            font-family: monospace;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>APIS Labs</h1>
        <div class="preset-container">
            <button class="btn-preset" onclick="loadPreset('retail')">E-Commerce Operations</button>
            <button class="btn-preset" onclick="loadPreset('logistics')">Logistics & Warehouse Sync</button>
        </div>
    </div>

    <div class="dashboard">
        <div class="panel">
            <div class="matrix-split-container">
                <div class="matrix-box">
                    <label>Matrix Alpha</label>
                    <textarea id="dataInputA"></textarea>
                    <textarea id="mappingInputA"></textarea>
                </div>
                <div class="matrix-box">
                    <label>Matrix Beta</label>
                    <textarea id="dataInputB"></textarea>
                    <textarea id="mappingInputB"></textarea>
                </div>
            </div>
        </div>

        <div class="panel">
            <button class="btn-action" id="transformBtn">Run Simultaneous Core →</button>
        </div>

        <div class="panel">
            <div class="matrix-split-container">
                <div class="matrix-box">
                    <label>Alpha Output</label>
                    <div class="output-view" id="outputContainerA"></div>
                </div>
                <div class="matrix-box">
                    <label>Beta Output</label>
                    <div class="output-view" id="outputContainerB"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const testPresets = {
            retail: {
                dataA: { "orderId": "ORD-2026-99", "checkout_total": "1450.00" },
                mappingA: [ { "source": "orderId", "target": "transaction_id" } ],
                dataB: { "TXN_NUM": 883201, "NET_AMT": "2900.50" },
                mappingB: [ { "source": "TXN_NUM", "target": "transaction_id" } ]
            },
            logistics: {
                dataA: { "Lead_ID": "00Q800", "Annual_Revenue": "500000" },
                mappingA: [ { "source": "Annual_Revenue", "target": "arr" } ],
                dataB: { "pallet_barcode": 44920, "load_lbs": 9921 },
                mappingB: [ { "source": "load_lbs", "target": "metric_mass" } ]
            }
        };

        function loadPreset(key) {
            const suite = testPresets[key];
            document.getElementById('dataInputA').value = JSON.stringify(suite.dataA, null, 2);
            document.getElementById('mappingInputA').value = JSON.stringify(suite.mappingA, null, 2);
            document.getElementById('dataInputB').value = JSON.stringify(suite.dataB, null, 2);
            document.getElementById('mappingInputB').value = JSON.stringify(suite.mappingB, null, 2);
        }
    </script>
</body>
</html>
